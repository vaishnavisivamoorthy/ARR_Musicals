        h1{
            color:teal;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;

        }
        
        .menu ul li{
            list-style-type:none;
            display: inline;
            padding: 65px;

            font-size: 20px;
            color: teal;
        }

             text-decoration-line: none;
        }
        .menu ul li:hover{
            color: teal;
            text-shadow:6px 6px 4px rgb(167, 177, 177);

        }
        .content p{
            margin:100px;
            padding: 10px;
            font-family: 'Times New Roman', Times, serif;
            border: 3px solid grey;
            color: steelblue;
            border-radius: 25px;
            font-size: 20px;
        }
        .content p:hover{
            scale: 1.1;
            color:white;
            background-color: steelblue;
        }
        .music{
            display: flex;
            flex-direction: row;
            margin: 25px;
        }
        .music button{
            color: teal;
            background-color: oldlace;
            font-family: 'Times New Roman', Times, serif;
            padding: 15px;
            margin: 28px;
            font-size: 20px;
            border: 3px solid grey;
            border-radius: 20px;
        }
        .music button:hover{
            background-color: teal;
            color:oldlace;
            box-shadow: 3px 3px 2px grey;
        }
        footer p{
            text-align: center;
            color: white;
            font-family: 'Times New Roman', Times, serif;
            font-size: 25px;
            margin-top: 70px;
            background-color: grey;
            border-radius: 500px;
        }
        #home:hover{
            box-shadow: 6px 6px 4px rgb(167, 177, 177);
            scale: 1.2;
        }
        .top ul{
            display: flex;
            justify-content: space-between;
            padding: 0px;
            margin: 0px;
        }
        .top ul li {
            display: inline-block;
        }
        .top ul li:hover{
            border-radius: 100px;
            box-shadow: 6px 6px 4px rgb(167, 177, 177);
            scale: 1.2;
        }
        .top ul li img{
            border-radius: 100px;
        }
        #fav{
            border-radius: 100px;
        }
        #fav:hover{
            box-shadow: 6px 6px 4px grey;
            scale: 1.2;
        }
        #profile{
            border-radius: 100px;
        }
        #profile:hover{
            box-shadow: 6px 6px 4px grey;
            scale: 1.2;
        }
        h2{
            color:white;
            text-align: center;
            font-family: 'Times New Roman', Times, serif;
            text-shadow: 6px 6px 4px rgb(203, 211, 211);
            background-color: slategray;
            border-radius: 100px;
        }
        .musics{
            display: flex;
        }
        audio:hover{
            box-shadow: 6px 6px 4px grey;
            border-radius: 50px;
        }
        .music1 img:hover{
            box-shadow: 6px  6px 4px grey;
            transform: scale(1.1);
        }
        .music1{
            width:300px;
            padding: 5px; 
            padding-left: 100px;
        }
        .music1 div{
            display: flex;
            flex-direction: row;
        }
        .music1 img{
            height:200px;
            width:300px; 
            border-radius: 20px;
        }
        .music1 audio{
            width:300px;
        }
        .music1 audio:hover{
            transform: scale(1.1);
        }
    </style>
