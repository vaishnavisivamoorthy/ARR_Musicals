<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            background-image: url('images/background.avif');
            background-size: cover;
        }
        .login{
            margin:200px;
            margin-bottom: 100px;
            margin-top: 120px;
            color:teal;
            border: 3px solid grey;
            border-radius: 10px;
            padding: 50px;
            padding-left:250px;
            font-size: 25px;
            box-shadow: 6px 6px 4px grey;
        }
        .login input{
            border: 3px solid grey;
            border-radius: 10px;
            color: white;
            background-color: rgb(3, 197, 197);
            font-family: 'Times New Roman', Times, serif;
            height:25px;
        }

        .login input:hover{
            box-shadow: 6px 6px 4px grey;
        }
        .login button{
            margin-left: 150px;
            padding: 8px;
            color: white;
            background-color: rgb(3, 197, 197);
            border: 3px solid grey;
            border-radius: 3px;
        }

        .login button:hover{
            box-shadow: 4px 4px 3px grey;
            scale: 1.2;
        }
    </style>
</head>
<body>
    <div class="login">
        <label>Username:</label><input type="text" name="username"><br><br>
        <label>Password:</label><input type="password" name="password"><br><br>
        <a href="Home.html"><button>LOG IN</button></a><br><br>
        <label>Create a new account</label><a href="create.html"> Create account</a><br><br>
        <a href="index.html"><button>BACK</button></a>
    </div>
</body>
</html>
